r" stroke-width="2" stroke-linecap="round">\n              <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />\n            </svg>\n          </button>\n        </div>\n\n        \x3c!-- 条目列表 --\x3e\n        <div class="panel-body">\n          \x3c!-- 模型切换 --\x3e\n          <div class="model-switch">\n            <span class="model-label">模型</span>\n            <div class="model-toggle">\n              <button\n                class="model-btn"\n                :class="{ active: currentModel === \'gemini\' }"\n                @click="switchModel(\'gemini\')"\n              >Gemini</button>\n              <button\n                class="model-btn"\n                :class="{ active: currentModel === \'claude\' }"\n                @click="switchModel(\'claude\')"\n              >Claude</button>\n            </div>\n          </div>\n\n          <div v-for="cat in categories" :key="cat.label" class="category">\n            <div class="cat-label">{{ cat.label }}</div>\n            <div class="cat-items">\n              <button\n                v-for="item in cat.items"\n                :key="item.name"\n                class="item"\n                :class="{ on: item.enabled }"\n                @click="togglePrompt(item.name)"\n              >\n                <span class="dot" />\n                <span class="item-name">{{ item.displayName }}</span>\n              </button>\n            </div>\n          </div>\n          <div v-if="categories.length === 0" class="empty">未检测到可控条目</div>\n        </div>\n      </div>\n    </Transition>\n  </div>\n</template>\n\n<script setup lang="ts">\n// ─── 常量 ───\nconst STORAGE_KEY = \'preset-switcher-fab-pos\';\nconst EDGE_GAP = 12;\nconst FAB_SIZE = 44;\nconst DRAG_THRESHOLD = 3;\n\n// ─── 宿主窗口 ───\nconst hostWindow = window.parent;\nconst windowWidth = ref(hostWindow.innerWidth);\nconst windowHeight = ref(hostWindow.innerHeight);\nconst isMobile = computed(() => windowWidth.value <= 500);\n\n// ─── 分类定义 ───\ninterface Category {\n  label: string;\n  items: { name: string; displayName: string; enabled: boolean }[];\n}\n\n// 将条目名称映射到分类\nfunction classifyPrompt(name: string): string {\n  // 角色相关\n  if (/角色基础|角色速览|性格调色盘|三面性|二次解释|NSFW调色盘|NPC设计|衣柜/.test(name)) return \'角色\';\n  // 世界与场景\n  if (/世界观|手枪卡|开场白/.test(name)) return \'世界 & 场景\';\n  // MVU\n  if (/MVU/.test(name)) return \'MVU\';\n  // EJS\n  if (/EJS/.test(name)) return \'EJS\';\n  // 创作工具\n  if (/自由创作助手|前端美化|世界书评估/.test(name)) return \'创作工具\';\n  // 兜底\n  return \'其他\';\n}\n\n// 去除条目名称中的 emoji 前缀，只显示关键名称\nfunction displayName(name: string): string {\n  return name.replace(/^[^\\p{L}\\p{N}]+/u, \'\').trim() || name;\n}\n\n// ─── 面板状态 ───\nconst isPanelOpen = ref(false);\n\n// ─── 模型切换 ───\ntype ModelType = \'gemini\' | \'claude\';\nconst SNAKE_PROMPT_NAME = \'🐍 秋青子吃掉了原生思维链\';\nconst currentModel = ref<ModelType>(\'gemini\');\n\nfunction detectCurrentModel(preset: Preset): ModelType {\n  return preset.settings.max_context >= 2000000 ? \'gemini\' : \'claude\';\n}\n\nasync function switchModel(model: ModelType) {\n  if (model === currentModel.value) return;\n  currentModel.value = model;\n\n  try {\n    await updatePresetWith(\'in_use\', preset => {\n      if (model === \'gemini\') {\n        preset.settings.max_context = 2000000;\n        // 启用「秋青子吃掉了原生思维链」\n        const p = preset.prompts.find(\n          p => (isPresetNormalPrompt(p) || isPresetSystemPrompt(p)) && p.name === SNAKE_PROMPT_NAME,\n        );\n        if (p) p.enabled = true;\n      } else {\n        preset.settings.max_context = 200000;\n        // 禁用「秋青子吃掉了原生思维链」\n        const p = preset.prompts.find(\n          p => (isPresetNormalPrompt(p) || isPresetSystemPrompt(p)) && p.name === SNAKE_PROMPT_NAME,\n        );\n        if (p) p.enabled = false;\n      }\n      return preset;\n    });\n    refreshPresetData();\n  } catch (e) {\n    // 回退\n    currentModel.value = model === \'gemini\' ? \'claude\' : \'gemini\';\n    console.error(\'[切换脚本] 模型切换失败:\', e);\n  }\n}\n\n// ─── 预设数据 ───\nconst currentPresetName = ref(\'\');\nconst promptEnabledMap = ref<Record<string, boolean>>({});\nconst sectionPromptNames = ref<string[]>([]);\n\n// ─── 区间标记 ───\nfunction extractSectionPrompts(prompts: PresetPrompt[]): string[] {\n  const result: string[] = [];\n  let inSection = false;\n  for (const p of prompts) {\n    if (!isPresetNormalPrompt(p) && !isPresetSystemPrompt(p)) continue;\n    const n = p.name;\n    if (n === \'【一般条目】\' || n === \'【MVU条目】\') { inSection = true; continue; }\n    if (n === \'【/一般条目】\' || n === \'【/MVU条目】\') { inSection = false; continue; }\n    if (inSection) result.push(n);\n  }\n  return result;\n}\n\nfunction refreshPresetData() {\n  try {\n    currentPresetName.value = getLoadedPresetName();\n    const preset = getPreset(\'in_use\');\n\n    // 检测当前模型\n    currentModel.value = detectCurrentModel(preset);\n\n    const names = extractSectionPrompts(preset.prompts);\n    sectionPromptNames.value = names;\n    const map: Record<string, boolean> = {};\n    for (const p of preset.prompts) {\n      if ((isPresetNormalPrompt(p) || isPresetSystemPrompt(p)) && names.includes(p.name)) {\n        map[p.name] = p.enabled;\n      }\n    }\n    promptEnabledMap.value = map;\n  } catch (e) {\n    console.warn(\'[切换脚本] 刷新预设数据失败:\', e);\n  }\n}\n\n// 计算分类列表\nconst categories = computed<Category[]>(() => {\n  const catMap = new Map<string, Category>();\n  // 按照分类定义的顺序\n  const order = [\'角色\', \'世界 & 场景\', \'创作工具\', \'MVU\', \'EJS\', \'其他\'];\n\n  for (const name of sectionPromptNames.value) {\n    const cat = classifyPrompt(name);\n    if (!catMap.has(cat)) {\n      catMap.set(cat, { label: cat, items: [] });\n    }\n    catMap.get(cat)!.items.push({\n      name,\n      displayName: displayName(name),\n      enabled: promptEnabledMap.value[name] ?? false,\n    });\n  }\n\n  return order.filter(k => catMap.has(k)).map(k => catMap.get(k)!);\n});\n\n// 初始刷新\nrefreshPresetData();\nconst refreshTimer = setInterval(refreshPresetData, 3000);\nonUnmounted(() => clearInterval(refreshTimer));\n\n// ─── 切换单个条目 ───\nasync function togglePrompt(name: string) {\n  const current = promptEnabledMap.value[name] ?? false;\n  // 乐观更新\n  promptEnabledMap.value[name] = !current;\n  try {\n    await updatePresetWith(\'in_use\', preset => {\n      const p = preset.prompts.find(\n        p => (isPresetNormalPrompt(p) || isPresetSystemPrompt(p)) && p.name === name,\n      );\n      if (p) p.enabled = !current;\n      return preset;\n    });\n  } catch (e) {\n    // 回退\n    promptEnabledMap.value[name] = current;\n    console.error(\'[切换脚本] 切换失败:\', e);\n  }\n}\n\n// ─── FAB 位置 ───\nfunction defaultFabPos() {\n  return { x: hostWindow.innerWidth - FAB_SIZE - 16, y: hostWindow.innerHeight * 0.4 };\n}\n\nfunction readFabPos(): { x: number; y: number } {\n  try {\n    const raw = hostWindow.localStorage.getItem(STORAGE_KEY);\n    if (raw) return JSON.parse(raw);\n  } catch { /* ignore */ }\n  return defaultFabPos();\n}\n\nfunction saveFabPos(pos: { x: number; y: number }) {\n  try { hostWindow.localStorage.setItem(STORAGE_KEY, JSON.stringify(pos)); } catch { /* ignore */ }\n}\n\nfunction clampPos(x: number, y: number) {\n  const vw = hostWindow.innerWidth;\n  const vh = hostWindow.innerHeight;\n  return {\n    x: _.clamp(x, EDGE_GAP, Math.max(EDGE_GAP, vw - FAB_SIZE - EDGE_GAP)),\n    y: _.clamp(y, EDGE_GAP, Math.max(EDGE_GAP, vh - FAB_SIZE - EDGE_GAP)),\n  };\n}\n\nconst fabPos = reactive(clampPos(readFabPos().x, readFabPos().y));\nconst fabStyle = computed(() => ({ left: `${fabPos.x}px`, top: `${fabPos.y}px` }));\n\nfunction setFabPos(x: number, y: number) {\n  const c = clampPos(x, y);\n  fabPos.x = c.x;\n  fabPos.y = c.y;\n  saveFabPos(c);\n}\n\n// ─── FAB 拖动 ───\nconst isDragging = ref(false);\nconst fabRef = ref<HTMLButtonElement | null>(null);\nlet dragStart = { x: 0, y: 0 };\nlet dragBase = { x: 0, y: 0 };\nlet hasMoved = false;\n\nfunction onFabPointerDown(e: PointerEvent) {\n  if (e.button !== 0) return;\n  e.preventDefault();\n  isDragging.value = false;\n  hasMoved = false;\n  dragStart = { x: e.clientX, y: e.clientY };\n  dragBase = { x: fabPos.x, y: fabPos.y };\n  hostWindow.addEventListener(\'pointermove\', onFabPointerMove);\n  hostWindow.addEventListener(\'pointerup\', onFabPointerUp);\n}\n\nfunction onFabPointerMove(e: PointerEvent) {\n  const dx = e.clientX - dragStart.x;\n  const dy = e.clientY - dragStart.y;\n  if (!hasMoved && Math.abs(dx) <= DRAG_THRESHOLD && Math.abs(dy) <= DRAG_THRESHOLD) return;\n  hasMoved = true;\n  isDragging.value = true;\n  setFabPos(dragBase.x + dx, dragBase.y + dy);\n}\n\nfunction onFabPointerUp() {\n  hostWindow.removeEventListener(\'pointermove\', onFabPointerMove);\n  hostWindow.removeEventListener(\'pointerup\', onFabPointerUp);\n  isDragging.value = false;\n  if (!hasMoved) {\n    isPanelOpen.value = true;\n    refreshPresetData();\n  }\n}\n\n// ─── 面板拖动 ───\nconst isPanelDragging = ref(false);\nconst panelOffset = ref<{ x: number; y: number } | null>(null);\nlet panelDragStart = { x: 0, y: 0 };\nlet panelDragBase = { x: 0, y: 0 };\nlet panelHasMoved = false;\n\nconst PANEL_W = 320;\nconst PANEL_H = 460;\n\nfunction calcPanelInitPos() {\n  if (isMobile.value) return { x: 0, y: 0 };\n  const vw = hostWindow.innerWidth;\n  const vh = hostWindow.innerHeight;\n  let left = fabPos.x > vw * 0.5 ? fabPos.x + FAB_SIZE - PANEL_W : fabPos.x;\n  left = _.clamp(left, EDGE_GAP, Math.max(EDGE_GAP, vw - PANEL_W - EDGE_GAP));\n  const above = fabPos.y - PANEL_H - 10;\n  const below = fabPos.y + FAB_SIZE + 10;\n  let top = above >= EDGE_GAP ? above : below + PANEL_H <= vh - EDGE_GAP ? below : _.clamp(above, EDGE_GAP, Math.max(EDGE_GAP, vh - PANEL_H - EDGE_GAP));\n  return { x: left, y: top };\n}\n\nconst panelStyle = computed(() => {\n  if (isMobile.value) return { left: \'0\', top: \'0\', width: \'100vw\', height: \'100vh\' };\n  const pos = panelOffset.value ?? calcPanelInitPos();\n  return { left: `${pos.x}px`, top: `${pos.y}px`, width: `${PANEL_W}px`, height: `${PANEL_H}px` };\n});\n\nwatch(isPanelOpen, open => { if (open) panelOffset.value = null; });\n\nfunction onPanelPointerDown(e: PointerEvent) {\n  if (e.button !== 0 || isMobile.value) return;\n  e.preventDefault();\n  isPanelDragging.value = false;\n  panelHasMoved = false;\n  panelDragStart = { x: e.clientX, y: e.clientY };\n  const cur = panelOffset.value ?? calcPanelInitPos();\n  panelDragBase = { x: cur.x, y: cur.y };\n  hostWindow.addEventListener(\'pointermove\', onPanelPointerMove);\n  hostWindow.addEventListener(\'pointerup\', onPanelPointerUp);\n}\n\nfunction onPanelPointerMove(e: PointerEvent) {\n  const dx = e.clientX - panelDragStart.x;\n  const dy = e.clientY - panelDragStart.y;\n  if (!panelHasMoved && Math.abs(dx) <= DRAG_THRESHOLD && Math.abs(dy) <= DRAG_THRESHOLD) return;\n  panelHasMoved = true;\n  isPanelDragging.value = true;\n  const vw = hostWindow.innerWidth;\n  const vh = hostWindow.innerHeight;\n  panelOffset.value = {\n    x: _.clamp(panelDragBase.x + dx, EDGE_GAP, Math.max(EDGE_GAP, vw - PANEL_W - EDGE_GAP)),\n    y: _.clamp(panelDragBase.y + dy, EDGE_GAP, Math.max(EDGE_GAP, vh - PANEL_H - EDGE_GAP)),\n  };\n}\n\nfunction onPanelPointerUp() {\n  hostWindow.removeEventListener(\'pointermove\', onPanelPointerMove);\n  hostWindow.removeEventListener(\'pointerup\', onPanelPointerUp);\n  isPanelDragging.value = false;\n}\n\n// ─── resize ───\nconst onResize = () => {\n  windowWidth.value = hostWindow.innerWidth;\n  windowHeight.value = hostWindow.innerHeight;\n  setFabPos(fabPos.x, fabPos.y);\n};\nonMounted(() => hostWindow.addEventListener(\'resize\', onResize));\nonUnmounted(() => hostWindow.removeEventListener(\'resize\', onResize));\n<\/script>\n\n<style scoped>\n.switcher-root {\n  font-family: \'Segoe UI\', system-ui, -apple-system, sans-serif;\n}\n\n/* ═══ FAB ═══ */\n.fab {\n  position: fixed;\n  width: 44px;\n  height: 44px;\n  border-radius: 50%;\n  border: 1px solid rgba(255,255,255,0.1);\n  background: rgba(15,23,42,0.88);\n  backdrop-filter: blur(8px);\n  cursor: grab;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  box-shadow: 0 3px 14px rgba(0,0,0,0.35);\n  color: rgba(255,255,255,0.75);\n  z-index: 9999;\n  user-select: none;\n  touch-action: none;\n  padding: 0;\n  transition: box-shadow .2s, transform .15s;\n}\n.fab:hover { box-shadow: 0 5px 20px rgba(0,0,0,0.45); transform: scale(1.06); }\n.fab:active, .fab.is-dragging { cursor: grabbing; transform: scale(1); }\n\n/* ═══ Panel ═══ */\n.panel {\n  position: fixed;\n  border-radius: 14px;\n  border: 1px solid rgba(255,255,255,0.08);\n  background: rgba(15,23,42,0.96);\n  backdrop-filter: blur(16px);\n  box-shadow: 0 10px 40px rgba(0,0,0,0.45);\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n  z-index: 9999;\n  color: rgba(255,255,255,0.88);\n}\n.panel.mobile {\n  width: 100vw !important;\n  height: 100vh !important;\n  border-radius: 0;\n  border: none;\n  left: 0 !important;\n  top: 0 !important;\n}\n\n/* ═══ Top bar ═══ */\n.panel-top {\n  display: flex;\n  align-items: center;\n  padding: 10px 14px;\n  border-bottom: 1px solid rgba(255,255,255,0.06);\n  background: rgba(15,23,42,0.5);\n  gap: 8px;\n  cursor: grab;\n  user-select: none;\n  touch-action: none;\n  flex-shrink: 0;\n}\n.mobile .panel-top { cursor: default; padding: 14px 16px; }\n.panel-top.dragging { cursor: grabbing; }\n\n.panel-title {\n  font-size: 13px;\n  font-weight: 600;\n  white-space: nowrap;\n}\n.panel-preset {\n  font-size: 11px;\n  color: rgba(255,255,255,0.3);\n  flex: 1;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n}\n.btn-icon {\n  width: 28px;\n  height: 28px;\n  border-radius: 6px;\n  border: none;\n  background: transparent;\n  color: rgba(255,255,255,0.35);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  cursor: pointer;\n  flex-shrink: 0;\n  transition: all .15s;\n}\n.btn-icon:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }\n\n/* ═══ Body ═══ */\n.panel-body {\n  flex: 1;\n  overflow-y: auto;\n  overflow-x: hidden;\n  padding: 6px 10px 10px;\n}\n.panel-body::-webkit-scrollbar { width: 3px; }\n.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }\n\n/* ═══ Category ═══ */\n.category {\n  margin-bottom: 8px;\n}\n.cat-label {\n  font-size: 10px;\n  font-weight: 600;\n  color: rgba(255,255,255,0.35);\n  text-transform: uppercase;\n  letter-spacing: 0.8px;\n  padding: 6px 4px 4px;\n  border-bottom: 1px solid rgba(255,255,255,0.04);\n  margin-bottom: 4px;\n}\n.cat-items {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 4px;\n}\n\n/* ═══ Item ═══ */\n.item {\n  display: inline-flex;\n  align-items: center;\n  gap: 5px;\n  padding: 5px 10px;\n  border-radius: 6px;\n  border: 1px solid rgba(255,255,255,0.06);\n  background: rgba(255,255,255,0.02);\n  color: rgba(255,255,255,0.4);\n  font-size: 12px;\n  cursor: pointer;\n  transition: all .15s;\n  white-space: nowrap;\n}\n.item:hover {\n  background: rgba(255,255,255,0.06);\n  color: rgba(255,255,255,0.7);\n}\n.item.on {\n  background: rgba(52,211,153,0.1);\n  border-color: rgba(52,211,153,0.25);\n  color: #5eead4;\n}\n.item.on:hover {\n  background: rgba(52,211,153,0.18);\n}\n\n.dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.12);\n  flex-shrink: 0;\n  transition: background .15s;\n}\n.item.on .dot {\n  background: #34d399;\n  box-shadow: 0 0 6px rgba(52,211,153,0.4);\n}\n\n.item-name {\n  max-width: 120px;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n\n.empty {\n  text-align: center;\n  color: rgba(255,255,255,0.25);\n  font-size: 12px;\n  padding: 32px 16px;\n}\n\n/* ═══ Model Switch ═══ */\n.model-switch {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 6px 4px 8px;\n  margin-bottom: 4px;\n  border-bottom: 1px solid rgba(255,255,255,0.06);\n}\n.model-label {\n  font-size: 10px;\n  font-weight: 600;\n  color: rgba(255,255,255,0.35);\n  text-transform: uppercase;\n  letter-spacing: 0.8px;\n}\n.model-toggle {\n  display: flex;\n  gap: 0;\n  border-radius: 6px;\n  overflow: hidden;\n  border: 1px solid rgba(255,255,255,0.08);\n}\n.model-btn {\n  padding: 5px 14px;\n  font-size: 12px;\n  font-weight: 500;\n  border: none;\n  background: rgba(255,255,255,0.02);\n  color: rgba(255,255,255,0.4);\n  cursor: pointer;\n  transition: all .15s;\n}\n.model-btn:first-child { border-right: 1px solid rgba(255,255,255,0.06); }\n.model-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }\n.model-btn.active {\n  background: rgba(99,102,241,0.15);\n  color: #a5b4fc;\n  font-weight: 600;\n}\n.model-btn.active:hover {\n  background: rgba(99,102,241,0.22);\n}\n\n/* ═══ Mobile adjustments ═══ */\n.mobile .cat-items {\n  gap: 6px;\n}\n.mobile .item {\n  padding: 8px 14px;\n  font-size: 14px;\n  border-radius: 8px;\n}\n.mobile .item-name {\n  max-width: 180px;\n}\n.mobile .dot {\n  width: 8px;\n  height: 8px;\n}\n.mobile .cat-label {\n  font-size: 12px;\n  padding: 8px 4px 6px;\n}\n.mobile .model-switch {\n  padding: 8px 4px 10px;\n}\n.mobile .model-btn {\n  padding: 8px 18px;\n  font-size: 14px;\n}\n\n/* ═══ Transitions ═══ */\n.fab-enter-active, .fab-leave-active { transition: opacity .2s ease; }\n.fab-enter-from, .fab-leave-to { opacity: 0; }\n\n.panel-enter-active, .panel-leave-active { transition: all .25s ease; }\n.panel-enter-from { opacity: 0; transform: translateY(12px) scale(0.97); }\n.panel-leave-to { opacity: 0; transform: translateY(12px) scale(0.97); }\n\n.mobile.panel-enter-from { opacity: 0; transform: translateY(100%); }\n.mobile.panel-leave-to { opacity: 0; transform: translateY(100%); }\n</style>\n'],sourceRoot:''}]);const s=i},185(e){e.exports=function(e){var n=[];return n.toString=function(){return this.map(function(n){var t='',a=void 0!==n[5];return n[4]&&(t+='@supports ('.concat(n[4],') {')),n[2]&&(t+='@media '.concat(n[2],' {')),a&&