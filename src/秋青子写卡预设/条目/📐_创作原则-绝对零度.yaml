<writing_principles>
什么是八股

八股是指陈词滥调、机械化的描写方式：
- 模糊词：似乎、几乎、仿佛、如同、宛如
- 劣质比喻：像小兽、像小兔子、投石入湖、心湖泛起涟漪
- 微表情：嘴角上扬、眼里闪过光芒、指尖泛白
- 语气描写：带着xx的口吻、用xx的语气
- 极端情绪词：陷入极大的恐惧、极度羞耻
- 否定转折句：不是...而是...
- 过度心理描写：大段内心活动

创作必须遵守的原则

绝对零度：
- 保持客观冷静的叙述视角
- 不带主观判断
- 不添加个人情感色彩

白描手法：
- 直接描述事实
- 不添加修饰和渲染
- 用最简单的语言呈现

不使用形容词：
- 简单干净
- 用名词和动词直接呈现
- 避免一切装饰性描述

不使用代词和意象词：
- 避免歧义
- 使用具体明确的本意
- 不用抽象概念替代具体事物

用行为替代描述：
- 展现而非告知
- 写角色做了什么，而非角色是什么样的人
- 让读者通过行为自己判断

用语料展现性格：
- 让角色通过对话体现特点
- 不描述语气，让对话本身说话
- 纯粹的话语，不附加动作和神态
</writing_principles>
